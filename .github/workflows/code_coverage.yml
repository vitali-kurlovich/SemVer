name: Code Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    name: Generate code coverage 
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v6
    - uses: SwiftyLab/setup-swift@latest
    
    - name: Run tests
      run: xcodebuild -scheme SemanticVersioning test -destination 'platform=macOS' -enableCodeCoverage YES -parallel-testing-enabled YES build test

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
          directory: ./.build/
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true # optional (default = false)